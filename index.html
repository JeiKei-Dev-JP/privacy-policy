<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nomadic JeiKei Apps</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1b2430;
      --muted: #5b6b7b;
      --accent: #0a84ff;
      --accent-hover: #006fe0;
      --border: #dde3ea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .hero {
      text-align: center;
      margin: 12px 0 28px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3.4vw, 2.1rem);
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }
    .apps {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card-title {
      margin: 0 0 4px;
      font-size: 1.08rem;
      font-weight: 700;
    }
    .card-desc {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      white-space: nowrap;
    }
    .btn:hover { background: var(--accent-hover); }
    footer {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 0.86rem;
    }
    @media (max-width: 560px) {
      .card {
        flex-direction: column;
        align-items: flex-start;
      }
      .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Nomadic JeiKei Apps</h1>
      <p>Nomadic JeiKei가 개발한 앱 목록입니다.</p>
    </section>

    <section class="apps" aria-label="app list">
      <article class="card">
        <div>
          <h2 class="card-title">TaptapGolf</h2>
          <p class="card-desc">골프 라운드 기록과 동기화를 지원하는 스코어 앱</p>
        </div>
        <a class="btn" href="taptapgolf.html">개인정보처리방침 보기</a>
      </article>
    </section>

    <footer>
      &copy; <span id="year"></span> Nomadic JeiKei
    </footer>
  </main>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
